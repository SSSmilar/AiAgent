name: golangci-lint

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/setup-go@v5
        with:
          go-version-file: '1.25.0'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7    # было v6
        with:
          version: v2.12.2